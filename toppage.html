<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予防医学専門薬剤師 提案ストック</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --accent-green: #10b981;
            --accent-blue: #06b6d4;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(6, 182, 212, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
        }

        /* メインヒーローセクション */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
            position: relative;
        }

        /* 軽快なアニメーション（フェードアップ） */
        .animate-up {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
            display: inline-block;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.3;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            max-width: 900px;
        }

        h1 span {
            background: linear-gradient(135deg, #0284c7, var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lead {
            font-size: 1.2rem;
            color: #64748b;
            max-width: 700px;
            line-height: 1.8;
            margin-bottom: 3.5rem;
        }

        /* 近未来風デジタルカウンターボード */
        .stats-container {
            display: flex;
            gap: 2rem;
            max-width: 800px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 2rem 3rem;
            border-radius: 24px;
            min-width: 220px;
            flex: 1;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.03);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        /* マウスホバーでSFホログラム的なグロウ効果 */
        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .stat-number {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-color);
            line-height: 1;
            margin-bottom: 0.5rem;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--text-color), #475569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.95rem;
            color: #64748b;
            font-weight: 500;
        }

        .stat-icon {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            color: rgba(16, 185, 129, 0.2);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="badge animate-up">PHARMACIST × SUPPLEMENT OPTIMIZATION</div>
        
        <h1 class="animate-up delay-1">
            薬剤師歴18年・サプリオタク歴11年の専門眼。<br>
            <span>日々進化する、確かな活動ログと提案のストック。</span>
        </h1>
        
        <p class="lead animate-up delay-1">
            一朝一夕の思い付きではない、積み重ねた経験と多様な価値観。成分・原材料のプロ目線と、価格・使いやすさのユーザー目線を両立し、最適なビジネス協業をデザインします。
        </p>

        <div class="stats-container animate-up delay-2">
            <div class="stat-card">
                <i class="fa-solid fa-link stat-icon"></i>
                <div class="stat-number" id="count-connections" data-target="1545">0</div>
                <div class="stat-label">紡いできた宝物（ご縁リスト）</div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-bottle-droplet stat-icon"></i>
                <div class="stat-number" id="count-supplements" data-target="40">0</div>
                <div class="stat-label">厳選サプリメント（19社）</div>
            </div>
        </div>
    </section>

    <script>
        // 超高速カウントアップアニメーション（ヒュンヒュン演出）
        function animateCounters() {
            const counters = document.querySelectorAll('.stat-number');
            
            counters.forEach(counter => {
                const target = parseInt(counter.getAttribute('data-target'));
                // ターゲットに応じて速度を調整（大きい数字ほどステップを大きく）
                const duration = 1500; // 1.5秒で完了
                const startTime = performance.now();

                function updateCount(currentTime) {
                    const elapsedTime = currentTime - startTime;
                    const progress = Math.min(elapsedTime / duration, 1);
                    
                    // イージング効果（後半にかけて少し減速してピタッと止まる気持ちよさ）
                    const easeOutQuad = progress * (2 - progress);
                    const currentCount = Math.floor(easeOutQuad * target);

                    // 数字にコンマを入れる（1,545のように）
                    counter.textContent = currentCount.toLocaleString();

                    if (progress < 1) {
                        requestAnimationFrame(updateCount);
                    } else {
                        counter.textContent = target.toLocaleString();
                    }
                }

                requestAnimationFrame(updateCount);
            });
        }

        // ページ読み込み完了時にカウンターを作動
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(animateCounters, 600); // アニメーションの波に合わせて発火
        });
    </script>
</body>
</html>
